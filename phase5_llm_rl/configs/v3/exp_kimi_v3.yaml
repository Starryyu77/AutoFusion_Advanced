# Kimi K2.5 扩展搜索 (Phase 5.6)
# 200 iterations, 128 shots, 15 epochs

experiment:
  name: exp_kimi_v3
  max_iterations: 200
  save_interval: 20
  output_dir: ./results/v3/exp_kimi

llm:
  type: aliyun
  model: kimi-k2.5
  api_key: ${ALIYUN_API_KEY}
  temperature: 0.7
  max_tokens: 2048

improvements:
  use_template_mode: true
  use_error_feedback: true
  max_retries: 3

evaluator:
  dataset: mmmu
  num_shots: 128
  train_epochs: 15
  batch_size: 8
  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.005
  max_training_time: 600

reward:
  weights:
    accuracy: 1.0
    efficiency: 1.5
    compile_success: 2.0

constraints:
  constraints:
    max_flops: 10000000
    max_params: 50000000
    target_accuracy: 0.5